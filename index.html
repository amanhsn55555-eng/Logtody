<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول · منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0b1120 0%, #19233c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.97);
      width: 100%;
      max-width: 420px;
      border-radius: 28px;
      padding: 30px 22px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.35);
      transform: perspective(1000px) rotateY(-5deg) rotateX(2deg);
      border: 3px solid transparent;
      background: linear-gradient(rgba(255,255,255,0.95),rgba(255,255,255,0.95)) padding-box,
                  linear-gradient(135deg,#fbbf24,#ec4899,#8b5cf6,#06b6d4,#fbbf24) border-box;
      box-shadow: -15px 15px 30px rgba(0,0,0,0.3), -5px 5px 15px rgba(251,191,36,0.2), inset 0 0 30px rgba(255,255,255,0.3);
      animation: rotate3d 8s ease-in-out infinite;
    }
    @keyframes rotate3d {
      0%,100% { transform: perspective(1000px) rotateY(-5deg) rotateX(2deg); }
      50% { transform: perspective(1000px) rotateY(5deg) rotateX(-2deg); }
    }

    .header-icon {
      text-align: center;
      margin-bottom: 20px;
    }
    .header-icon i {
      font-size: 45px;
      color: #fbbf24;
    }
    h2 {
      color: #0f172a;
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .sub {
      text-align: center;
      color: #64748b;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #1e293b;
      font-size: 14px;
    }
    label i {
      margin-left: 6px;
      color: #fbbf24;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      background: #fafcff;
      transition: 0.2s;
      direction: ltr;
      text-align: right;
    }
    input:focus {
      border-color: #fbbf24;
      outline: none;
      background: white;
    }
    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      border-radius: 24px;
      font-size: 18px;
      font-weight: bold;
      color: #0f172a;
      cursor: pointer;
      margin-top: 8px;
    }

    .toggle-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
      color: #334155;
    }
    .toggle-link a {
      color: #f59e0b;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      margin-right: 6px;
    }

    .id-preview {
      background: #f1f5f9;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      margin: 16px 0;
    }
    .id-preview strong {
      font-size: 22px;
      letter-spacing: 2px;
    }
    
    .emoji-picker {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }
    .emoji-pick {
      font-size: 30px;
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 18px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .emoji-pick.selected {
      border-color: #fbbf24;
      background: #fef3c7;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .loading.show {
      display: flex;
    }
    .spinner {
      background: white;
      padding: 28px 32px;
      border-radius: 32px;
      text-align: center;
    }
    .spinner i {
      font-size: 40px;
      color: #fbbf24;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px 20px;
      border-radius: 40px;
      text-align: center;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
    }
    .toast.show {
      opacity: 1;
      bottom: 36px;
    }

    .success-box {
      text-align: center;
    }
    .success-box i {
      font-size: 56px;
      color: #10b981;
      margin-bottom: 16px;
    }
    .user-badge {
      background: #fef3c7;
      border-radius: 24px;
      padding: 20px;
      margin: 24px 0;
    }
    .id-big {
      font-size: 34px;
      font-weight: 800;
      color: #0f172a;
    }
  </style>
</head>
<body>

<div class="auth-card" id="appContainer">
  <!-- نموذج تسجيل الدخول -->
  <div id="loginSection">
    <div class="header-icon"><i class="fas fa-crown"></i></div>
    <h2>تسجيل الدخول</h2>
    <div class="sub">أهلاً بعودتك</div>

    <div class="form-group">
      <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
      <input type="email" id="loginEmail" placeholder="example@mail.com">
      <div class="error-msg" id="loginEmailError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
      <div class="error-msg" id="loginPasswordError"></div>
    </div>

    <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>

    <div class="toggle-link">
      <span>جديد هنا؟</span>
      <a id="showRegisterLink">إنشاء حساب</a>
    </div>
  </div>

  <!-- نموذج التسجيل -->
  <div id="registerSection" style="display: none;">
    <div class="header-icon"><i class="fas fa-user-plus"></i></div>
    <h2>حساب جديد</h2>
    <div class="sub">انضم إلينا بسهولة</div>

    <div class="form-group">
      <label><i class="fas fa-user"></i> الاسم</label>
      <input type="text" id="regName" placeholder="محمد أحمد">
      <div class="error-msg" id="regNameError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> البريد</label>
      <input type="email" id="regEmail" placeholder="example@mail.com">
      <div class="error-msg" id="regEmailError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="regPassword" placeholder="أدخل كلمة المرور">
      <div class="error-msg" id="regPasswordError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-check"></i> تأكيد المرور</label>
      <input type="password" id="regConfirm" placeholder="••••••••">
      <div class="error-msg" id="regConfirmError"></div>
    </div>

    <div class="id-preview">
      <span>معرفك: </span><strong id="randomIdPreview">------</strong>
    </div>
    
    <div>
      <label><i class="fas fa-smile"></i> اختر إيموجي</label>
      <div class="emoji-picker" id="emojiSelector">
        <span class="emoji-pick selected" data-emoji="😎">😎</span>
        <span class="emoji-pick" data-emoji="👑">👑</span>
        <span class="emoji-pick" data-emoji="🐼">🐼</span>
        <span class="emoji-pick" data-emoji="🌟">🌟</span>
      </div>
    </div>

    <button class="btn" id="registerBtn"><i class="fas fa-user-check"></i> إنشاء الحساب</button>

    <div class="toggle-link">
      <span>لديك حساب؟</span>
      <a id="showLoginLink">تسجيل الدخول</a>
    </div>
  </div>
</div>

<!-- اللودر -->
<div class="loading" id="loadingOverlay">
  <div class="spinner">
    <i class="fas fa-spinner"></i>
    <p style="margin-top: 14px; color:#0f172a;">جاري المعالجة...</p>
  </div>
</div>

<!-- توست -->
<div class="toast" id="toastMsg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  // ========== إعدادات Firebase ==========
  const firebaseConfig = {
    apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
    authDomain: "elahbes.firebaseapp.com",
    projectId: "elahbes",
    storageBucket: "elahbes.firebasestorage.app",
    messagingSenderId: "800207969145",
    appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
    measurementId: "G-EFT566SJMP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========== عناصر الواجهة ==========
  const loginSection = document.getElementById('loginSection');
  const registerSection = document.getElementById('registerSection');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const toast = document.getElementById('toastMsg');
  const container = document.getElementById('appContainer');

  const loginEmail = document.getElementById('loginEmail');
  const loginPassword = document.getElementById('loginPassword');
  const loginBtn = document.getElementById('loginBtn');
  const regName = document.getElementById('regName');
  const regEmail = document.getElementById('regEmail');
  const regPassword = document.getElementById('regPassword');
  const regConfirm = document.getElementById('regConfirm');
  const registerBtn = document.getElementById('registerBtn');
  const randomIdSpan = document.getElementById('randomIdPreview');

  let selectedEmoji = '😎';

  // ========== الإعدادات الافتراضية (احتياط) ==========
  const DEFAULT_SETTINGS = {
    registration_open: true,
    min_email_len: 5,
    min_pass_len: 6,
    banned_passwords: [],
    default_money: 1000,
    default_gold: 10,
    default_elixir: 10,
    default_oil: 10,
    default_ddo: 0
  };

  // ========== تحميل الإعدادات من قاعدة البيانات ==========
  async function loadAdminSettings() {
    const settings = {};
    
    for (const [key, fallback] of Object.entries(DEFAULT_SETTINGS)) {
      try {
        const snap = await getDoc(doc(db, "admin_settings", key));
        settings[key] = snap.exists() ? snap.data().value : fallback;
      } catch (e) {
        settings[key] = fallback;
      }
    }
    
    console.log('✅ تم تحميل إعدادات الإدارة:', settings);
    return settings;
  }

  // ========== دوال مساعدة ==========
  function showToastMsg(msg, isSuccess = true) {
    toast.textContent = msg;
    toast.style.background = isSuccess ? '#10b981' : '#ef4444';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function showLoading(show) {
    loadingOverlay.classList.toggle('show', show);
  }

  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => { el.style.display = 'none'; el.textContent = ''; });
    document.querySelectorAll('input').forEach(i => i.style.borderColor = '#e2e8f0');
  }

  function showFieldError(fieldId, msg) {
    const field = document.getElementById(fieldId);
    const err = document.getElementById(fieldId + 'Error');
    if (field) field.style.borderColor = '#ef4444';
    if (err) { err.textContent = msg; err.style.display = 'block'; }
  }

  function generateId() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ========== عرض نجاح التسجيل ==========
  function renderSuccessScreen(userData, resources, isNew = false) {
    container.innerHTML = `
      <div class="success-box">
        <i class="fas fa-check-circle"></i>
        <h2>${isNew ? 'تم التسجيل!' : 'مرحباً'}</h2>
        <p style="color: #475569;">${userData.username || userData.name || 'مستخدم'}</p>
        <div style="background: #f8fafc; border-radius: 32px; padding: 24px; margin-top: 16px;">
          <div style="font-size: 64px;">${userData.emoji || '😎'}</div>
          <div class="user-badge">
            <div class="id-big">#${userData.userId}</div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 16px;">
            <div style="background: #d1fae5; padding: 10px; border-radius: 14px;">
              <i class="fas fa-coins" style="color: #059669;"></i>
              <strong>${(resources.money || 0).toLocaleString()}</strong>
              <div style="font-size: 11px; color: #065f46;">مال</div>
            </div>
            <div style="background: #fef3c7; padding: 10px; border-radius: 14px;">
              <i class="fas fa-gem" style="color: #b45309;"></i>
              <strong>${(resources.gold || 0).toLocaleString()}</strong>
              <div style="font-size: 11px; color: #92400e;">ذهب</div>
            </div>
            <div style="background: #ede9fe; padding: 10px; border-radius: 14px;">
              <i class="fas fa-flask" style="color: #6d28d9;"></i>
              <strong>${(resources.elixir || 0).toLocaleString()}</strong>
              <div style="font-size: 11px; color: #4c1d95;">إكسير</div>
            </div>
            <div style="background: #cffafe; padding: 10px; border-radius: 14px;">
              <i class="fas fa-oil-can" style="color: #0e7490;"></i>
              <strong>${(resources.oil || 0).toLocaleString()}</strong>
              <div style="font-size: 11px; color: #164e63;">نفط</div>
            </div>
            ${(resources.ddo || 0) > 0 ? `
            <div style="background: #fce7f3; padding: 10px; border-radius: 14px; grid-column: span 2;">
              <i class="fas fa-gem" style="color: #be185d;"></i>
              <strong>${(resources.ddo || 0).toLocaleString()}</strong>
              <div style="font-size: 11px; color: #831843;">DDO</div>
            </div>
            ` : ''}
          </div>
        </div>
        <button class="btn" style="margin-top: 28px;" onclick="window.location.reload()">تسجيل حساب آخر</button>
      </div>
    `;
  }

  // ========== تسجيل الدخول ==========
  async function handleLogin() {
    clearErrors();
    const email = loginEmail.value.trim();
    const pass = loginPassword.value;
    let valid = true;
    if (!email) { showFieldError('loginEmail', 'البريد مطلوب'); valid = false; }
    if (!pass) { showFieldError('loginPassword', 'كلمة المرور مطلوبة'); valid = false; }
    if (!valid) return;

    showLoading(true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      try {
        const userDoc = await getDoc(doc(db, "users", cred.user.uid));
        const resDoc = await getDoc(doc(db, "resources", cred.user.uid));
        
        const userData = userDoc.exists() ? userDoc.data() : { 
          username: 'مستخدم', 
          userId: generateId(), 
          emoji: '😎' 
        };
        const resources = resDoc.exists() ? resDoc.data() : { 
          money: 0, gold: 0, elixir: 0, oil: 0, ddo: 0 
        };
        
        renderSuccessScreen(userData, resources, false);
        showToastMsg('تم الدخول بنجاح');
      } catch (e) {
        const tempData = { username: 'مستخدم', userId: generateId(), emoji: '😎' };
        renderSuccessScreen(tempData, { money: 0, gold: 0, elixir: 0, oil: 0, ddo: 0 }, false);
      }
    } catch (err) {
      let msg = 'بيانات الدخول غير صحيحة';
      if (err.code === 'auth/user-not-found') msg = 'الحساب غير موجود';
      else if (err.code === 'auth/wrong-password') msg = 'كلمة مرور خاطئة';
      else if (err.code === 'auth/invalid-email') msg = 'بريد غير صالح';
      else if (err.code === 'auth/too-many-requests') msg = 'محاولات كثيرة، حاول لاحقاً';
      showToastMsg(msg, false);
    } finally {
      showLoading(false);
    }
  }

  // ========== تسجيل جديد ==========
  async function handleRegister() {
    clearErrors();
    
    // ✋ تحميل إعدادات الإدارة أولاً
    const adminSettings = await loadAdminSettings();
    
    // ✋ التحقق من أن التسجيل مفتوح
    if (adminSettings.registration_open === false) {
      showToastMsg('🚫 التسجيل مغلق حالياً من قبل الإدارة', false);
      return;
    }
    
    const name = regName.value.trim();
    const email = regEmail.value.trim();
    const pass = regPassword.value;
    const confirm = regConfirm.value;
    let valid = true;
    
    // التحقق من الاسم
    if (!name || name.length < 2) { 
      showFieldError('regName', 'الاسم مطلوب (حرفين على الأقل)'); 
      valid = false; 
    }
    
    // التحقق من البريد
    if (!email) { 
      showFieldError('regEmail', 'البريد مطلوب'); 
      valid = false; 
    }
    
    // تطبيق الحد الأدنى لطول البريد من الإعدادات
    const minEmailLen = adminSettings.min_email_len;
    if (email && email.length < minEmailLen) {
      showFieldError('regEmail', `البريد يجب أن يكون ${minEmailLen} أحرف على الأقل`);
      valid = false;
    }
    
    // تطبيق الحد الأدنى لطول كلمة المرور من الإعدادات
    const minPassLen = adminSettings.min_pass_len;
    if (!pass || pass.length < minPassLen) { 
      showFieldError('regPassword', `كلمة المرور يجب أن تكون ${minPassLen} أحرف على الأقل`); 
      valid = false; 
    }
    
    // التحقق من كلمات المرور الممنوعة
    const bannedPasswords = adminSettings.banned_passwords || [];
    if (pass && bannedPasswords.length > 0 && bannedPasswords.includes(pass)) {
      showFieldError('regPassword', 'كلمة المرور هذه غير مسموحة من قبل الإدارة');
      valid = false;
    }
    
    // التحقق من تطابق كلمة المرور
    if (pass !== confirm) { 
      showFieldError('regConfirm', 'كلمة المرور غير متطابقة'); 
      valid = false; 
    }
    
    if (!valid) return;

    showLoading(true);
    try {
      // إنشاء الحساب في Firebase Auth
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const userId = generateId();
      
      // ✅ استخدام العملات من إعدادات الإدارة
      const defaultResources = {
        money: adminSettings.default_money || 1000,
        gold: adminSettings.default_gold || 10,
        elixir: adminSettings.default_elixir || 10,
        oil: adminSettings.default_oil || 10,
        ddo: adminSettings.default_ddo || 0
      };
      
      const userData = {
        uid: cred.user.uid,
        email: email,
        username: name,
        userId: userId,
        emoji: selectedEmoji,
        avatarType: 'emoji',
        avatarUrl: '',
        colors: {
          frame: '#fbbf24',
          name: '#0f172a',
          id: '#8b5cf6',
          postText: '#334155',
          commentText: '#475569'
        },
        bio: '',
        relationship: 'اعزب',
        secondaryId: '',
        verified: false,
        banned: false,
        createdAt: new Date().toISOString()
      };

      try {
        // حفظ بيانات المستخدم
        await setDoc(doc(db, "users", cred.user.uid), userData);
        
        // حفظ المعرف في users_by_id
        await setDoc(doc(db, "users_by_id", userId), { 
          uid: cred.user.uid,
          userId: userId 
        });
        
        // ✅ حفظ الموارد بالقيم من الإعدادات
        await setDoc(doc(db, "resources", cred.user.uid), defaultResources);
        
        console.log('✅ تم إنشاء الحساب بالموارد:', defaultResources);
      } catch (firestoreError) {
        console.log('⚠️ خطأ في حفظ البيانات:', firestoreError);
        // نحاول الحفظ مرة أخرى
        try {
          await setDoc(doc(db, "users", cred.user.uid), userData);
          await setDoc(doc(db, "resources", cred.user.uid), defaultResources);
        } catch(e) {
          console.log('❌ فشل الحفظ مرة أخرى');
        }
      }

      // عرض نجاح التسجيل
      renderSuccessScreen(userData, defaultResources, true);
      showToastMsg(`🎉 تم إنشاء الحساب بنجاح! حصلت على ${defaultResources.money?.toLocaleString()} عملة`);
    } catch (err) {
      let msg = 'فشل التسجيل';
      if (err.code === 'auth/email-already-in-use') msg = 'البريد مستخدم مسبقاً';
      else if (err.code === 'auth/invalid-email') msg = 'بريد غير صالح';
      else if (err.code === 'auth/weak-password') msg = 'كلمة المرور ضعيفة جداً';
      else if (err.code === 'auth/too-many-requests') msg = 'محاولات كثيرة، حاول لاحقاً';
      showToastMsg(msg, false);
    } finally {
      showLoading(false);
    }
  }

  // ========== التبديل بين النماذج ==========
  document.getElementById('showRegisterLink').addEventListener('click', (e) => {
    e.preventDefault();
    loginSection.style.display = 'none';
    registerSection.style.display = 'block';
    randomIdSpan.textContent = generateId();
    clearErrors();
  });

  document.getElementById('showLoginLink').addEventListener('click', (e) => {
    e.preventDefault();
    registerSection.style.display = 'none';
    loginSection.style.display = 'block';
    clearErrors();
  });

  // ========== اختيار الإيموجي ==========
  document.querySelectorAll('.emoji-pick').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.emoji-pick').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmoji = el.dataset.emoji;
    });
  });

  // ========== أحداث الأزرار ==========
  loginBtn.addEventListener('click', handleLogin);
  registerBtn.addEventListener('click', handleRegister);

  // Enter
  loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
  regConfirm.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleRegister(); });

  // ========== تهيئة ==========
  window.addEventListener('load', () => {
    randomIdSpan.textContent = generateId();
  });
</script>
</body>
</html>
