<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>تسجيل الدخول · منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #0b1120, #19233c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.97);
      width: 100%;
      max-width: 420px;
      border-radius: 28px;
      padding: 30px 22px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35);
      border: 3px solid transparent;
      background: linear-gradient(rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.95)) padding-box,
                  linear-gradient(135deg, #fbbf24, #ec4899, #8b5cf6, #06b6d4, #fbbf24) border-box;
      box-shadow: -15px 15px 30px rgba(0, 0, 0, 0.3), -5px 5px 15px rgba(251, 191, 36, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.3);
      animation: rotate3d 8s ease-in-out infinite;
    }
    @keyframes rotate3d {
      0%, 100% { transform: perspective(1000px) rotateY(-5deg) rotateX(2deg); }
      50% { transform: perspective(1000px) rotateY(5deg) rotateX(-2deg); }
    }
    .header-icon { text-align: center; margin-bottom: 20px; }
    .header-icon i { font-size: 45px; color: #fbbf24; }
    h2 { color: #0f172a; font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .sub { text-align: center; color: #64748b; margin-bottom: 28px; font-size: 14px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #1e293b; font-size: 14px; }
    label i { margin-left: 6px; color: #fbbf24; }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      background: #fafcff;
      transition: 0.2s;
      text-align: right;
    }
    input:focus { border-color: #fbbf24; outline: none; background: #fff; }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 5px; display: none; }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      border-radius: 24px;
      font-size: 18px;
      font-weight: bold;
      color: #0f172a;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .toggle-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid #e2e8f0;
      color: #334155;
    }
    .toggle-link a {
      color: #f59e0b;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      margin-right: 6px;
    }
    .verify-card { text-align: center; }
    .verify-card .email-display {
      background: #f1f5f9;
      border-radius: 16px;
      padding: 12px;
      margin: 16px 0;
      font-size: 14px;
      color: #64748b;
    }
    .verify-card .email-display strong { color: #0f172a; font-size: 16px; }
    .code-display-box {
      background: linear-gradient(145deg, #fef3c7, #fde68a);
      border-radius: 20px;
      padding: 20px;
      margin: 16px 0;
    }
    .code-display-box .big-code {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: 6px;
      color: #0f172a;
    }
    .code-display-box .timer-text { color: #92400e; font-size: 13px; margin-top: 8px; }
    .code-inputs { display: flex; gap: 6px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    .code-inputs input {
      width: 42px;
      height: 50px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      border-radius: 12px;
      padding: 0;
    }
    .resend-btn {
      background: none;
      border: 2px solid #fbbf24;
      color: #b45309;
      padding: 10px 20px;
      border-radius: 24px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      margin-top: 8px;
      transition: 0.2s;
    }
    .resend-btn:hover { background: #fef3c7; }
    .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .friend-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f0fdf4;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      border: 2px solid #10b981;
    }
    .friend-preview .fp-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      border: 2px solid #10b981;
      background: #d1fae5;
    }
    .friend-preview .fp-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .friend-notfound {
      background: #fee2e2;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      border: 2px solid #ef4444;
      color: #991b1b;
      font-size: 13px;
      text-align: center;
    }
    .emoji-picker { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
    .emoji-pick {
      font-size: 30px;
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 18px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .emoji-pick.selected { border-color: #fbbf24; background: #fef3c7; }
    .id-preview {
      background: #f1f5f9;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
      margin: 16px 0;
    }
    .id-preview strong { font-size: 22px; letter-spacing: 2px; }
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .loading.show { display: flex; }
    .spinner {
      background: #fff;
      padding: 28px 32px;
      border-radius: 32px;
      text-align: center;
    }
    .spinner i { font-size: 40px; color: #fbbf24; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: #fff;
      padding: 14px 20px;
      border-radius: 40px;
      text-align: center;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
    }
    .toast.show { opacity: 1; bottom: 36px; }
    .success-box { text-align: center; }
    .success-box i { font-size: 56px; color: #10b981; margin-bottom: 16px; }
    .user-badge {
      background: #fef3c7;
      border-radius: 24px;
      padding: 20px;
      margin: 24px 0;
    }
    .id-big { font-size: 34px; font-weight: 800; color: #0f172a; }
  </style>
</head>
<body>

<div class="auth-card" id="appContainer">
  <!-- نموذج تسجيل الدخول -->
  <div id="loginSection">
    <div class="header-icon"><i class="fas fa-crown"></i></div>
    <h2>تسجيل الدخول</h2>
    <div class="sub">أهلاً بعودتك</div>
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> البريد</label>
      <input type="email" id="loginEmail" placeholder="example@mail.com" autocomplete="email">
      <div class="error-msg" id="loginEmailError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      <div class="error-msg" id="loginPasswordError"></div>
    </div>
    <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div class="toggle-link"><span>جديد هنا؟</span> <a id="showRegisterLink">إنشاء حساب</a></div>
  </div>

  <!-- نموذج التسجيل -->
  <div id="registerSection" style="display:none">
    <div class="header-icon"><i class="fas fa-user-plus"></i></div>
    <h2>حساب جديد</h2>
    <div class="sub">الانضمام عبر معرف صديق فقط</div>
    
    <div class="form-group">
      <label><i class="fas fa-user"></i> الاسم</label>
      <input type="text" id="regName" placeholder="محمد أحمد" autocomplete="name">
      <div class="error-msg" id="regNameError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> البريد</label>
      <input type="email" id="regEmail" placeholder="example@mail.com" autocomplete="email">
      <div class="error-msg" id="regEmailError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> كلمة المرور</label>
      <input type="password" id="regPassword" placeholder="أدخل كلمة المرور" autocomplete="new-password">
      <div class="error-msg" id="regPasswordError"></div>
    </div>
    <div class="form-group">
      <label><i class="fas fa-check"></i> تأكيد المرور</label>
      <input type="password" id="regConfirm" placeholder="••••••••" autocomplete="new-password">
      <div class="error-msg" id="regConfirmError"></div>
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-user-friends"></i> معرف الصديق <span style="color:#ef4444">*</span></label>
      <input type="text" id="friendId" placeholder="أدخل معرف صديقك (إجباري)" oninput="checkFriendId()" autocomplete="off">
      <div class="error-msg" id="friendIdError"></div>
      <div id="friendPreview" style="display:none"></div>
    </div>
    
    <div class="id-preview"><span>معرفك: </span><strong id="randomIdPreview">------</strong></div>
    
    <div>
      <label><i class="fas fa-smile"></i> اختر إيموجي</label>
      <div class="emoji-picker">
        <span class="emoji-pick selected" data-emoji="😎">😎</span>
        <span class="emoji-pick" data-emoji="👑">👑</span>
        <span class="emoji-pick" data-emoji="🐼">🐼</span>
        <span class="emoji-pick" data-emoji="🌟">🌟</span>
      </div>
    </div>
    
    <button class="btn" id="registerBtn" disabled><i class="fas fa-user-check"></i> إنشاء الحساب</button>
    <div class="toggle-link"><span>لديك حساب؟</span> <a id="showLoginLink">تسجيل الدخول</a></div>
  </div>

  <!-- صفحة التفعيل -->
  <div id="verifySection" style="display:none">
    <div class="verify-card">
      <div class="header-icon"><i class="fas fa-shield-alt"></i></div>
      <h2>تأكيد الحساب</h2>
      <div class="email-display">تم إرسال رمز التفعيل إلى<br><strong id="verifyEmail">example@mail.com</strong></div>
      
      <div class="code-display-box">
        <div class="big-code" id="codeDisplay">------</div>
        <div class="timer-text">⏳ الرمز صالح لمدة <span id="codeTimer">10</span> ثواني</div>
      </div>
      
      <div class="code-inputs">
        <input type="text" id="c1" maxlength="1" oninput="moveNext(this,'c2')" inputmode="numeric">
        <input type="text" id="c2" maxlength="1" oninput="moveNext(this,'c3')" inputmode="numeric">
        <input type="text" id="c3" maxlength="1" oninput="moveNext(this,'c4')" inputmode="numeric">
        <input type="text" id="c4" maxlength="1" oninput="moveNext(this,'c5')" inputmode="numeric">
        <input type="text" id="c5" maxlength="1" oninput="moveNext(this,'c6')" inputmode="numeric">
        <input type="text" id="c6" maxlength="1" oninput="checkVerifyCode()" inputmode="numeric">
      </div>
      <div class="error-msg" id="verifyError"></div>
      
      <button class="btn" id="verifyBtn" disabled onclick="confirmVerification()"><i class="fas fa-check-circle"></i> تأكيد التفعيل</button>
      <button class="resend-btn" id="resendBtn" disabled onclick="resendCode()">🔄 إعادة إرسال الرمز</button>
    </div>
  </div>
</div>

<div class="loading" id="loadingOverlay">
  <div class="spinner">
    <i class="fas fa-spinner"></i>
    <p style="margin-top:14px;color:#0f172a">جاري المعالجة...</p>
  </div>
</div>
<div class="toast" id="toastMsg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { 
    getFirestore, 
    doc, 
    setDoc, 
    getDoc, 
    getDocs, 
    query, 
    collection, 
    where 
  } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
    authDomain: "elahbes.firebaseapp.com",
    projectId: "elahbes",
    storageBucket: "elahbes.firebasestorage.app",
    messagingSenderId: "800207969145",
    appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
    measurementId: "G-EFT566SJMP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ========== الموارد الإجبارية الثابتة لكل حساب جديد ==========
  const MANDATORY_RESOURCES = {
    money: 0,    // TMR
    gold: 1,     // ذهب
    elixir: 1,   // إكسير
    oil: 0,      // نفط
    ddo: 0       // DDO
  };

  let selectedEmoji = '😎';
  let friendData = null;
  let friendUid = null;
  let isFriendValid = false;
  
  let currentCode = '';
  let codeTimer = null;
  let isCodeVerified = false;
  let codeExpired = false;
  let pendingUserData = null;

  // ========== دوال مساعدة ==========
  function toastMsg(message, isSuccess = true) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = message;
    toast.style.background = isSuccess ? '#10b981' : '#ef4444';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').classList.toggle('show', show);
  }

  function clearAllErrors() {
    document.querySelectorAll('.error-msg').forEach(e => { e.style.display = 'none'; e.textContent = ''; });
    document.querySelectorAll('input').forEach(i => i.style.borderColor = '#e2e8f0');
  }

  function showFieldError(inputId, message) {
    const input = document.getElementById(inputId);
    const errorDiv = document.getElementById(inputId + 'Error');
    if (input) input.style.borderColor = '#ef4444';
    if (errorDiv) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }
  }

  function generateUserId() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  function generateVerificationCode() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // ========== التحقق من معرف الصديق ==========
  window.checkFriendId = async function() {
    const friendIdInput = document.getElementById('friendId');
    const previewDiv = document.getElementById('friendPreview');
    const val = friendIdInput.value.trim();
    
    if (!val) {
      previewDiv.style.display = 'none';
      friendData = null;
      friendUid = null;
      isFriendValid = false;
      updateRegisterButton();
      return;
    }
    
    try {
      const q = await getDocs(query(collection(db, "users"), where("userId", "==", val)));
      
      if (q.empty) {
        previewDiv.style.display = 'block';
        previewDiv.innerHTML = '<div class="friend-notfound">❌ المعرف غير موجود</div>';
        friendData = null;
        friendUid = null;
        isFriendValid = false;
        updateRegisterButton();
        return;
      }
      
      const userDoc = q.docs[0];
      friendUid = userDoc.id;
      friendData = userDoc.data();
      isFriendValid = true;
      
      const avatarContent = (friendData.avatarType === 'image' && friendData.avatarUrl) 
        ? `<img src="${friendData.avatarUrl}" alt="avatar">` 
        : (friendData.emoji || '👤');
        
      previewDiv.style.display = 'block';
      previewDiv.innerHTML = `
        <div class="friend-preview">
          <div class="fp-avatar">${avatarContent}</div>
          <div>
            <strong>${friendData.username || 'مستخدم'}</strong>
            <br><small>#${friendData.userId || val}</small>
          </div>
        </div>`;
      
      updateRegisterButton();
    } catch (error) {
      console.error("خطأ في البحث عن الصديق:", error);
      previewDiv.style.display = 'block';
      previewDiv.innerHTML = '<div class="friend-notfound">⚠️ حدث خطأ، حاول مجدداً</div>';
      isFriendValid = false;
      updateRegisterButton();
    }
  };

  function updateRegisterButton() {
    document.getElementById('registerBtn').disabled = !isFriendValid;
  }

  // ========== إدارة التفعيل ==========
  function showVerificationSection(email) {
    document.getElementById('registerSection').style.display = 'none';
    document.getElementById('verifySection').style.display = 'block';
    document.getElementById('verifyEmail').textContent = email;
    document.getElementById('verifyBtn').disabled = true;
    document.getElementById('verifyError').style.display = 'none';
    
    isCodeVerified = false;
    codeExpired = false;
    
    currentCode = generateVerificationCode();
    document.getElementById('codeDisplay').textContent = currentCode;
    document.getElementById('codeTimer').textContent = '20';
    document.getElementById('codeTimer').style.color = '#92400e';
    
    // تفريغ خانات الإدخال
    for (let i = 1; i <= 6; i++) {
      const input = document.getElementById('c' + i);
      input.value = '';
      input.style.borderColor = '#e2e8f0';
    }
    document.getElementById('c1').focus();
    
    document.getElementById('resendBtn').disabled = true;
    
    let timeLeft = 20;
    if (codeTimer) clearInterval(codeTimer);
    
    codeTimer = setInterval(() => {
      timeLeft--;
      document.getElementById('codeTimer').textContent = timeLeft;
      
      if (timeLeft <= 5) {
        document.getElementById('codeTimer').style.color = '#ef4444';
      }
      
      if (timeLeft <= 0) {
        clearInterval(codeTimer);
        document.getElementById('codeDisplay').textContent = '------';
        codeExpired = true;
        currentCode = '';
        document.getElementById('resendBtn').disabled = false;
        toastMsg('⌛ انتهت صلاحية الرمز', false);
      }
    }, 1000);
    
    // يمكن إعادة الإرسال بعد 10 ثواني
    setTimeout(() => {
      document.getElementById('resendBtn').disabled = false;
    }, 10000);
  }

  window.resendCode = function() {
    if (codeExpired || !currentCode) {
      const email = document.getElementById('verifyEmail').textContent;
      showVerificationSection(email);
      toastMsg('📨 تم إرسال رمز جديد');
    }
  };

  window.moveNext = function(currentInput, nextId) {
    if (currentInput.value.length === 1) {
      const next = document.getElementById(nextId);
      if (next) next.focus();
    }
    if (document.getElementById('c6').value.length === 1) {
      checkVerifyCode();
    }
  };

  window.checkVerifyCode = function() {
    let enteredCode = '';
    for (let i = 1; i <= 6; i++) {
      enteredCode += document.getElementById('c' + i).value;
    }
    
    if (enteredCode.length === 6) {
      if (enteredCode === currentCode && !codeExpired) {
        isCodeVerified = true;
        document.getElementById('verifyError').style.display = 'none';
        document.getElementById('verifyBtn').disabled = false;
        for (let i = 1; i <= 6; i++) {
          document.getElementById('c' + i).style.borderColor = '#10b981';
        }
      } else {
        isCodeVerified = false;
        document.getElementById('verifyError').textContent = '❌ الرمز غير صحيح أو منتهي الصلاحية';
        document.getElementById('verifyError').style.display = 'block';
        document.getElementById('verifyBtn').disabled = true;
        for (let i = 1; i <= 6; i++) {
          document.getElementById('c' + i).style.borderColor = '#ef4444';
        }
      }
    }
  };

  window.confirmVerification = async function() {
    if (!isCodeVerified || !pendingUserData) {
      toastMsg('الرجاء إدخال رمز التفعيل الصحيح', false);
      return;
    }
    clearInterval(codeTimer);
    await completeRegistration();
  };

  // ========== إنهاء التسجيل بالموارد الإجبارية ==========
  async function completeRegistration() {
    if (!pendingUserData) return;
    
    const userData = pendingUserData;
    showLoading(true);
    
    try {
      // إنشاء الحساب في Firebase Auth
      const userCredential = await createUserWithEmailAndPassword(auth, userData.email, userData.password);
      const uid = userCredential.user.uid;
      
      // بيانات الملف الشخصي
      const profileData = {
        uid: uid,
        email: userData.email,
        username: userData.name,
        userId: userData.userId,
        emoji: userData.emoji,
        avatarType: 'emoji',
        avatarUrl: '',
        colors: {
          frame: '#fbbf24',
          name: '#0f172a',
          id: '#8b5cf6',
          postText: '#334155',
          commentText: '#475569'
        },
        bio: '',
        relationship: 'اعزب',
        secondaryId: '',
        verified: false,
        banned: false,
        friendId: friendData.userId,
        friendUid: friendUid,
        createdAt: new Date().toISOString()
      };
      
      // حفظ البيانات في Firestore
      await setDoc(doc(db, "users", uid), profileData);
      await setDoc(doc(db, "users_by_id", userData.userId), { uid: uid, userId: userData.userId });
      
      // 🔥 كتابة الموارد الإجبارية الثابتة (السيرفر يفرض هذه القيم)
      await setDoc(doc(db, "resources", uid), MANDATORY_RESOURCES);
      
      // عرض شاشة النجاح
      renderSuccessScreen(profileData, MANDATORY_RESOURCES, true);
      toastMsg('🎉 تم التسجيل! الموارد: 0 عملة، 1 ذهب، 1 إكسير');
      
    } catch (error) {
      console.error("فشل التسجيل:", error);
      let message = 'فشل إنشاء الحساب';
      if (error.code === 'auth/email-already-in-use') {
        message = 'هذا البريد الإلكتروني مستخدم مسبقاً';
      } else if (error.code === 'auth/weak-password') {
        message = 'كلمة المرور ضعيفة جداً';
      }
      toastMsg(message, false);
    } finally {
      showLoading(false);
    }
  }

  // ========== تسجيل الدخول ==========
  async function handleLogin() {
    clearAllErrors();
    
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email) { showFieldError('loginEmail', 'البريد الإلكتروني مطلوب'); return; }
    if (!password) { showFieldError('loginPassword', 'كلمة المرور مطلوبة'); return; }
    
    showLoading(true);
    
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      
      let userData = { username: 'مستخدم', userId: generateUserId(), emoji: '😎' };
      let resourceData = { ...MANDATORY_RESOURCES };
      
      try {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists()) userData = userSnap.data();
        
        const resSnap = await getDoc(doc(db, "resources", uid));
        if (resSnap.exists()) resourceData = resSnap.data();
      } catch (e) {
        console.warn("بعض بيانات المستخدم غير متوفرة:", e);
      }
      
      renderSuccessScreen(userData, resourceData, false);
      toastMsg('تم تسجيل الدخول بنجاح');
      
    } catch (error) {
      console.error("فشل الدخول:", error);
      let message = 'بيانات الدخول غير صحيحة';
      if (error.code === 'auth/user-not-found') message = 'الحساب غير موجود';
      else if (error.code === 'auth/wrong-password') message = 'كلمة المرور خاطئة';
      else if (error.code === 'auth/invalid-email') message = 'صيغة البريد غير صحيحة';
      toastMsg(message, false);
    } finally {
      showLoading(false);
    }
  }

  // ========== بدء التسجيل (التحقق من البيانات) ==========
  async function handleRegister() {
    clearAllErrors();
    
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirm').value;
    
    let isValid = true;
    
    if (!name || name.length < 2) {
      showFieldError('regName', 'الاسم يجب أن يكون حرفين على الأقل');
      isValid = false;
    }
    
    if (!email) {
      showFieldError('regEmail', 'البريد الإلكتروني مطلوب');
      isValid = false;
    } else if (email.length < 5 || !email.includes('@')) {
      showFieldError('regEmail', 'صيغة بريد إلكتروني غير صحيحة');
      isValid = false;
    }
    
    if (!password || password.length < 6) {
      showFieldError('regPassword', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
      isValid = false;
    }
    
    if (password !== confirmPassword) {
      showFieldError('regConfirm', 'كلمتا المرور غير متطابقتين');
      isValid = false;
    }
    
    if (!isFriendValid || !friendData) {
      showFieldError('friendId', 'معرف الصديق إجباري وغير صحيح');
      isValid = false;
    }
    
    if (!isValid) return;
    
    const newUserId = generateUserId();
    
    // حفظ بيانات المستخدم مؤقتاً لحين التفعيل
    pendingUserData = {
      name: name,
      email: email,
      password: password,
      userId: newUserId,
      emoji: selectedEmoji
    };
    
    // الانتقال إلى شاشة التفعيل
    showVerificationSection(email);
  }

  // ========== عرض شاشة النجاح النهائية ==========
  function renderSuccessScreen(userData, resources, isNewAccount = false) {
    const container = document.getElementById('appContainer');
    
    const moneyValue = (resources.money ?? MANDATORY_RESOURCES.money).toLocaleString();
    const goldValue = (resources.gold ?? MANDATORY_RESOURCES.gold).toLocaleString();
    const elixirValue = (resources.elixir ?? MANDATORY_RESOURCES.elixir).toLocaleString();
    const oilValue = (resources.oil ?? MANDATORY_RESOURCES.oil).toLocaleString();
    const ddoValue = (resources.ddo ?? MANDATORY_RESOURCES.ddo).toLocaleString();
    
    container.innerHTML = `
      <div class="success-box">
        <i class="fas fa-check-circle"></i>
        <h2>${isNewAccount ? '🎉 تم التسجيل!' : 'مرحباً بعودتك'}</h2>
        <p style="font-size:18px; margin:8px 0;">${userData.username || 'مستخدم'}</p>
        
        <div style="background:#f8fafc; border-radius:32px; padding:24px; margin-top:16px">
          <div style="font-size:64px">${userData.emoji || '😎'}</div>
          
          <div class="user-badge">
            <div class="id-big">#${userData.userId || '------'}</div>
          </div>
          
          ${userData.friendId ? `
          <div style="background:#f0fdf4; border-radius:16px; padding:10px; margin:8px 0; border:1px solid #10b981;">
            <i class="fas fa-user-friends"></i> مسجل عبر الصديق: <strong>#${userData.friendId}</strong>
          </div>` : ''}
          
          <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-top:16px">
            <div style="background:#d1fae5; padding:12px; border-radius:14px; text-align:center;">
              <i class="fas fa-coins"></i><br>
              <strong style="font-size:18px;">${moneyValue}</strong><br>
              <small>مال (TMR)</small>
            </div>
            <div style="background:#fef3c7; padding:12px; border-radius:14px; text-align:center;">
              <i class="fas fa-gem"></i><br>
              <strong style="font-size:18px;">${goldValue}</strong><br>
              <small>ذهب</small>
            </div>
            <div style="background:#ede9fe; padding:12px; border-radius:14px; text-align:center;">
              <i class="fas fa-flask"></i><br>
              <strong style="font-size:18px;">${elixirValue}</strong><br>
              <small>إكسير</small>
            </div>
            <div style="background:#cffafe; padding:12px; border-radius:14px; text-align:center;">
              <i class="fas fa-oil-can"></i><br>
              <strong style="font-size:18px;">${oilValue}</strong><br>
              <small>نفط</small>
            </div>
            ${parseInt(resources.ddo) > 0 ? `
            <div style="background:#fce7f3; padding:12px; border-radius:14px; text-align:center; grid-column: span 2;">
              <i class="fas fa-gem"></i><br>
              <strong style="font-size:18px;">${ddoValue}</strong><br>
              <small>DDO</small>
            </div>` : ''}
          </div>
        </div>
        
        <button class="btn" style="margin-top:28px" onclick="location.reload()">
          <i class="fas fa-redo"></i> ${isNewAccount ? 'تسجيل حساب آخر' : 'تسجيل الدخول مجدداً'}
        </button>
      </div>
    `;
  }

  // ========== ربط الأحداث ==========
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('registerBtn').addEventListener('click', handleRegister);
  
  document.getElementById('showRegisterLink').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('registerSection').style.display = 'block';
    document.getElementById('verifySection').style.display = 'none';
    document.getElementById('randomIdPreview').textContent = generateUserId();
    document.getElementById('registerBtn').disabled = true;
    clearAllErrors();
    document.getElementById('friendId').value = '';
    document.getElementById('friendPreview').style.display = 'none';
    isFriendValid = false;
  });
  
  document.getElementById('showLoginLink').addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('registerSection').style.display = 'none';
    document.getElementById('verifySection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    clearAllErrors();
  });
  
  // اختيار الإيموجي
  document.querySelectorAll('.emoji-pick').forEach(el => {
    el.addEventListener('click', function() {
      document.querySelectorAll('.emoji-pick').forEach(e => e.classList.remove('selected'));
      this.classList.add('selected');
      selectedEmoji = this.dataset.emoji;
    });
  });
  
  // دعم زر Enter
  document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('regConfirm').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleRegister();
  });
  
  // توليد معرف عشوائي عند التحميل
  window.addEventListener('load', () => {
    document.getElementById('randomIdPreview').textContent = generateUserId();
  });
</script>
</body>
</html>
